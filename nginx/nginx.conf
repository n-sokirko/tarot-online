server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — re-resolve service names every 10 s.
    # This prevents stale IPs after container recreations.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # Django static files (output of collectstatic)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django REST API
    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Django admin panel
    location /admin/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js app (everything else)
    location / {
        set $frontend_upstream "frontend:3000";
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket support (Next.js HMR / Server-Sent Events)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_cache_bypass                 $http_upgrade;
    }
}
